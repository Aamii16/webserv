server
{
	listen 127.0.0.1:8081
	listen 127.0.0.1:8080
	listen 127.0.0.0:8081
	root /home/amzahir/github/webserv/www
	server_name yippee
	client_max_body_size 1000000

	error_pages
		400 /home/amzahir/github/webserv/errors/400.html
		404 /home/amzahir/github/webserv/errors/404.html
		500 /home/amzahir/github/webserv/errors/500.html

	location
		path /
		upload_path /home/amzahir/github/webserv/www
		methods GET POST
		index index.html
		autoindex false

	location 	
		path /images
		methods GET
		index index
		root /home/amzahir/github/webserv/www/pictures

	location
		path /upload
		upload_path /home/amzahir/github/webserv/uploaded
		methods POST

	location
		path /old-page
		return 301 /home/amzahir/github/webserv/www

	location
		path /cgi-bin
		root /home/amzahir/github/webserv/www/cgi-bin
		methods GET
		cgi .php /usr/bin/php-cgi
		cgi .py /usr/bin/py-cgi
		cgi .js /usr/bin/js-cgi
}
server:
  listen: 127.0.0.1:8080
  server_name: mysite.local
  root: /var/www/site1
  client_max_body_size: 1000000   # bytes

  error_pages:
    404: /errors/404.html
    413: /errors/413.html

  location:
    path: /
    methods: [GET, POST]
    index: index.html
    autoindex: false

  location:
    path: /images
    methods: [GET]
    root: /var/www/site1/pictures
    autoindex: true

  location:
    path: /upload
    methods: [POST]
    upload_path: /var/www/site1/uploads

  location:
    path: /old-page
    return:
      status: 301
      url: /new-page

  location:
    path: /cgi-bin
    methods: [GET, POST]
    cgi_extension: .php
    cgi_path: /usr/bin/php-cgi
    root: /var/www/site1/cgi-bin